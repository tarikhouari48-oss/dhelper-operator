name: operator_app
description: Call Center / Order Management App
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.1.0
  intl: ^0.20.2
  uuid: ^4.4.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  fl_chart: ^0.69.0
  http: ^1.2.0
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
